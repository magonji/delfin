services:
  delfin:
    # Pull the published image from GitHub Container Registry...
    image: ghcr.io/magonji/delfin:latest
    # ...or build it locally instead with:  docker compose build
    build: .
    container_name: delfin
    restart: unless-stopped
    ports:
      - "8422:8422"
    environment:
      # Local timezone — so the nightly maintenance runs at the configured
      # wall-clock time (e.g. 02:28 local) instead of UTC. Change to your zone.
      - TZ=Europe/London
      # Daily off-disk backup target (inside the container). Defaults to /app/backups.
      - DELFIN_BACKUP_DIR=/app/backups
    volumes:
      # Live SQLite database.
      - ./data:/app/data
      # Backups target 
      # Backups stay dormant until you enable them with the sentinel file:
      #   touch ./backups/.delfin-backup-enabled
      - ./backups:/app/backups
